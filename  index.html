<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
</head>
<body>
<div class="container py-5">
    <header class="mb-5">
        <h1 class="display-4 text-center">RSS агрегатор</h1>
        <p class="lead text-center text-muted">
            Начните читать RSS сегодня! Это легко, это красиво.
        </p>
    </header>

    <main>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form class="rss-form" data-form="rss">
                    <div class="mb-3">
                        <label for="rss-url" class="form-label h5">Ссылка RSS</label>
                        <div class="input-group">
                            <input
                                    type="url"
                                    class="form-control"
                                    id="rss-url"
                                    placeholder="https://example.com/rss"
                                    aria-describedby="url-help"
                                    data-input="url"
                                    required
                            >
                            <button
                                    type="submit"
                                    class="btn btn-primary"
                                    data-button="add"
                            >
                                Добавить
                            </button>
                        </div>
                        <div id="url-help" class="form-text">
                            Пример: https://lorem-rss.hexlet.app/feed
                        </div>
                    </div>
                </form>

                <div class="feedback mt-3" data-feedback></div>
            </div>
        </div>

        <div class="row mt-5" data-posts-container>
            <div class="col-12">
                <h2 class="h4 mb-3">Посты</h2>
                <div class="list-group" data-posts-list></div>
            </div>
        </div>
    </main>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
