<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
</head>
<body>
<div class="container py-5">
    <header class="mb-5">
        <h1 class="display-4 text-center" data-header-title></h1>
        <p class="lead text-center text-muted" data-header-subtitle></p>
    </header>

    <main>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form class="rss-form" data-form="rss">
                    <div class="mb-3">
                        <label for="rss-url" class="form-label h5" data-form-label></label>
                        <div class="input-group">
                            <input
                                    type="url"
                                    class="form-control"
                                    id="rss-url"
                                    name="url"
                                    data-input="url"
                                    aria-label="url"
                                    data-form-placeholder
                                    required
                            >
                            <button
                                    type="submit"
                                    class="btn btn-primary"
                                    data-button="add"
                                    data-form-button
                            >
                            </button>
                        </div>
                        <div id="url-help" class="form-text" data-form-example></div>
                    </div>
                </form>

                <div class="feedback mt-3" data-feedback></div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12 col-md-6">
                <h2 class="h4 mb-3" data-feeds-title></h2>
                <ul class="list-group" data-feeds-list></ul>
            </div>
            <div class="col-12 col-md-6">
                <h2 class="h4 mb-3" data-posts-title></h2>
                <ul class="list-group" data-posts-list></ul>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="postModalLabel"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" data-modal-body></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-modal-close>Закрыть</button>
                <a href="#" class="btn btn-primary" data-modal-link target="_blank">Читать полностью</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
